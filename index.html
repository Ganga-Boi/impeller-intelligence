<script>
let selectedSymptom = '';

function toggleSym(el) {
  document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedSymptom = el.dataset.val;
}

async function submit() {
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorBanner');
  const model = document.getElementById('model').value.trim();
  const system_type = document.getElementById('system_type').value;
  const expected_flow = document.getElementById('expected_flow').value;
  const actual_flow = document.getElementById('actual_flow').value;
  const reality = document.getElementById('reality').value.trim();

  if (!selectedSymptom && !reality) {
    err.textContent = 'Please select a problem type or describe what happened.';
    err.style.display = 'block';
    return;
  }

  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Analyzing...';

  const text = [
    selectedSymptom && 'Primary symptom: ' + selectedSymptom,
    model && 'Impeller Model: ' + model,
    system_type && 'System Type: ' + system_type,
    expected_flow && 'Expected Flow: ' + expected_flow + ' m³/h',
    actual_flow && 'Actual Flow: ' + actual_flow + ' m³/h',
    reality && 'Description: ' + reality
  ].filter(Boolean).join('\n');

  try {
    const res = await fetch('/api/analyze', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text, model, system_type, expected_flow, actual_flow})
    });

    if (!res.ok) throw new Error('api_' + res.status);

    const data = await res.json();

    showResult(data, false);

  } catch(e) {

    const demo = buildDemo(selectedSymptom || reality, system_type, expected_flow, actual_flow);

    showResult(demo, true);

  } finally {

    btn.disabled = false;
    btn.textContent = 'Submit Feedback →';

  }
}

function showResult(data, isDemo) {

  document.getElementById('demoBadge').style.display = isDemo ? 'block' : 'none';

  document.getElementById('resCat').textContent = data.category || 'Unknown';
  document.getElementById('resCause').textContent = data.possible_cause || '';

  const actEl = document.getElementById('resActions');

  actEl.innerHTML = (data.recommended_actions||[]).map(a =>
    '<div class="result-action">'+a+'</div>'
  ).join('');

  document.getElementById('resultCard').style.display = 'block';

  document.getElementById('resultCard').scrollIntoView({
    behavior:'smooth',
    block:'start'
  });

  /* DEMO STORAGE */

  const submissions = JSON.parse(sessionStorage.getItem('submissions')||'[]');

  submissions.unshift({
    id: Date.now(),
    model: document.getElementById('model').value||'—',
    system: document.getElementById('system_type').value||'—',
    symptom: selectedSymptom||'Other',
    category: data.category,
    cause: data.possible_cause,
    severity: data.severity||3,
    confidence: data.confidence||75,
    actions: data.recommended_actions||[],
    time: new Date().toLocaleString('en-GB', {hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'})
  });

  sessionStorage.setItem('submissions', JSON.stringify(submissions.slice(0,50)));

  /* NEW — SAVE TO SUPABASE */

  fetch('https://dnjkexltcdgpjjmqwwmk.supabase.co/rest/v1/feedback', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'apikey':'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRuamtleGx0Y2RncGpqbXF3d21rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzgyMzAsImV4cCI6MjA4ODQ1NDIzMH0.GpJ0woQTur1HFpPDl-pRLZDpiO7eJESrr6IxE2HF8Q4',
      'Authorization':'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRuamtleGx0Y2RncGpqbXF3d21rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzgyMzAsImV4cCI6MjA4ODQ1NDIzMH0.GpJ0woQTur1HFpPDl-pRLZDpiO7eJESrr6IxE2HF8Q4'
    },
    body: JSON.stringify({
      model: document.getElementById('model').value || null,
      category: data.category || null,
      system_issue: selectedSymptom || null,
      severity: data.severity || 3,
      confidence: data.confidence || 75,
      installation_vs_design: document.getElementById('system_type').value || null,
      impeller_relevance: 'Unknown'
    })
  });

}
</script>
