<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MULTI*WING — Field Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* (din eksisterende CSS – uændret) */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:#f0f1f2;color:#0a0a0a}
.hero{background:#0a0a0a;color:white;padding:30px}
.form-wrap{max-width:600px;margin:auto;padding:20px}
input,textarea,select{width:100%;padding:10px;margin-bottom:10px}
button{padding:14px 20px;background:#0a0a0a;color:white;border:none}
.result-card{background:white;padding:20px;margin-top:20px}
</style>
</head>

<body>

<div class="hero">
<h1>MULTI*WING Field Feedback</h1>
</div>

<div class="form-wrap">

<label>Problem</label>
<select id="symptom">
<option value="">Select</option>
<option>Flow deviation</option>
<option>Noise</option>
<option>Vibration</option>
<option>Pressure issue</option>
<option>Overheating</option>
<option>Other</option>
</select>

<label>Impeller Model</label>
<input id="model">

<label>System Type</label>
<select id="system_type">
<option>HVAC</option>
<option>Industrial ventilation</option>
<option>Process cooling</option>
<option>Powertrain cooling</option>
<option>Exhaust system</option>
</select>

<label>Description</label>
<textarea id="reality"></textarea>

<button onclick="submitFeedback()">Submit</button>

<div class="result-card" id="resultCard" style="display:none">
<h3 id="resCat"></h3>
<p id="resCause"></p>
</div>

</div>

<script>

/* SUPABASE */
const SUPABASE_URL = "https://dnjkexltcdgpjjmqwwmk.supabase.co";
const SUPABASE_KEY = "PASTE_ANON_PUBLIC_KEY_HERE";

/* SUBMIT */

async function submitFeedback(){

const symptom=document.getElementById("symptom").value;
const model=document.getElementById("model").value;
const system_type=document.getElementById("system_type").value;
const reality=document.getElementById("reality").value;

const analysis=analyze(symptom,reality);

/* SHOW RESULT */

document.getElementById("resCat").textContent=analysis.category;
document.getElementById("resCause").textContent=analysis.cause;
document.getElementById("resultCard").style.display="block";

/* SAVE TO SUPABASE */

await fetch(`${SUPABASE_URL}/rest/v1/feedback`,{
method:"POST",
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:model,
system_type:system_type,
system_issue:symptom,
probable_cause:analysis.cause,
severity:analysis.severity
})
});

}

/* SIMPLE ANALYSIS */

function analyze(symptom,text){

if(symptom==="Flow deviation")
return{
category:"Flow deviation",
cause:"System resistance likely higher than expected",
severity:3
};

if(symptom==="Noise")
return{
category:"Noise",
cause:"Possible blade interference or turbulence",
severity:3
};

if(symptom==="Vibration")
return{
category:"Vibration",
cause:"Impeller imbalance or bearing wear",
severity:4
};

if(symptom==="Pressure issue")
return{
category:"Pressure issue",
cause:"Fan not reaching required static pressure",
severity:3
};

if(symptom==="Overheating")
return{
category:"Overheating",
cause:"Motor overloaded or airflow restriction",
severity:4
};

return{
category:"General issue",
cause:"More diagnostic data required",
severity:2
};

}

</script>

</body>
</html>
