<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MULTI*WING — Field Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --black: #0a0a0a;
  --white: #fff;
  --bg: #f0f1f2;
  --grey: #e2e3e5;
  --grey2: #b0b4b8;
  --grey3: #6b7075;
  --red: #c0392b;
}
body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--black);
}

/* HEADER */
header {
  background: var(--white);
  border-bottom: 1px solid var(--grey);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top:0; z-index:10;
}
.logo-lockup { display:flex; align-items:center; gap:9px; text-decoration:none; color:var(--black); }
.lw-wordmark { display:flex; flex-direction:column; line-height:1; }
.lw-line1 { display:flex; align-items:center; }
.lw-multi, .lw-wing { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900; letter-spacing:0.04em; }
.lw-star-wrap { display:inline-flex; align-items:center; margin:0 1px; }
.lw-star { width:16px; height:16px; animation:spin 8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.lw-tm { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; vertical-align:super; margin-left:1px; }
.lw-sub { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--grey3); margin-top:2px; }

.dashboard-link {
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--grey3); text-decoration:none; border:1.5px solid var(--grey); padding:6px 14px; border-radius:100px;
  transition:all 0.15s;
}
.dashboard-link:hover { border-color:var(--black); color:var(--black); }

/* HERO */
.hero {
  background: var(--black); color:white;
  padding: 32px 20px 28px;
}
.hero-eyebrow {
  font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700;
  letter-spacing:0.25em; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:8px;
}
.hero-title {
  font-family:'Barlow Condensed',sans-serif; font-size:36px; font-weight:800;
  text-transform:uppercase; letter-spacing:0.02em; line-height:1;
}
.hero-sub {
  font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:400;
  text-transform:uppercase; color:rgba(255,255,255,0.45); letter-spacing:0.04em; margin-top:4px;
}

/* FORM */
.form-wrap { max-width:600px; margin:0 auto; padding:24px 16px 48px; }

.step-label {
  font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700;
  letter-spacing:0.22em; text-transform:uppercase; color:var(--grey3);
  margin-bottom:12px; margin-top:28px;
  display:flex; align-items:center; gap:8px;
}
.step-label::after { content:''; flex:1; height:1px; background:var(--grey); }

/* BUTTON GRID — symptom picker */
.btn-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:4px;
}
.sym-btn {
  font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700;
  letter-spacing:0.06em; text-transform:uppercase;
  background:var(--white); color:var(--black);
  border:2px solid var(--grey); padding:14px 12px;
  border-radius:4px; cursor:pointer; text-align:left;
  transition:all 0.12s; line-height:1.3;
}
.sym-btn span { display:block; font-weight:400; font-size:11px; text-transform:none; letter-spacing:0; color:var(--grey3); margin-top:2px; }
.sym-btn.selected {
  background:var(--black); color:white; border-color:var(--black);
}
.sym-btn.selected span { color:rgba(255,255,255,0.6); }

/* INPUTS */
.input-group { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
label {
  font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700;
  letter-spacing:0.18em; text-transform:uppercase; color:var(--grey3);
}
input, textarea, select {
  background:var(--white); border:1px solid var(--grey); border-bottom:2px solid var(--grey2);
  color:var(--black); font-family:'Barlow',sans-serif; font-size:15px; font-weight:500;
  padding:12px 14px; outline:none; transition:border-color 0.15s; width:100%; border-radius:0; appearance:none;
}
input:focus, textarea:focus, select:focus { border-bottom-color:var(--black); background:var(--white); }
input::placeholder, textarea::placeholder { color:var(--grey2); font-weight:400; }
textarea { resize:vertical; min-height:80px; line-height:1.6; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.unit-wrap { display:flex; }
.unit-wrap input { flex:1; border-right:none; }
.unit { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; color:var(--grey3); background:var(--grey); border:1px solid var(--grey); border-bottom:2px solid var(--grey2); padding:0 12px; display:flex; align-items:center; white-space:nowrap; }

/* SUBMIT */
.submit-area { margin-top:32px; }
.btn-submit {
  width:100%; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700;
  letter-spacing:0.1em; text-transform:uppercase; background:var(--black); color:white;
  border:none; padding:18px; border-radius:100px; cursor:pointer; transition:all 0.15s;
}
.btn-submit:disabled { opacity:0.4; cursor:not-allowed; }
.btn-submit:hover:not(:disabled) { background:#2d2d2d; }

/* ERROR */
.error-banner { background:#fdf0ef; border-left:3px solid var(--red); padding:10px 14px; font-size:13px; color:var(--red); margin-bottom:16px; display:none; }

/* RESULT CARD */
.result-card {
  background:var(--white); padding:24px; margin-top:24px;
  border-left:4px solid var(--black);
  display:none;
}
.result-cat {
  font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:800;
  text-transform:uppercase; margin-bottom:8px;
}
.result-cause { font-size:14px; color:var(--grey3); line-height:1.6; margin-bottom:16px; }
.result-actions { display:flex; flex-direction:column; gap:6px; }
.result-action { font-size:13px; display:flex; gap:8px; }
.result-action::before { content:'→'; font-weight:700; color:var(--grey2); flex-shrink:0; }
.demo-badge {
  font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700;
  letter-spacing:0.15em; text-transform:uppercase;
  background:#fff8e1; border-left:3px solid #e8a020; padding:7px 12px; color:#b07800;
  margin-bottom:16px; display:none;
}
</style>
</head>
<body>

<header>
  <a class="logo-lockup" href="index.html">
    <div class="lw-wordmark">
      <div class="lw-line1">
        <span class="lw-multi">MULTI</span>
        <span class="lw-star-wrap">
          <svg class="lw-star" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M41 50 L37 9 Q50 1 63 9 L59 50 Z" fill="#0a0a0a" transform="rotate(0 50 50)"/>
            <path d="M41 50 L37 9 Q50 1 63 9 L59 50 Z" fill="#0a0a0a" transform="rotate(60 50 50)"/>
            <path d="M41 50 L37 9 Q50 1 63 9 L59 50 Z" fill="#0a0a0a" transform="rotate(120 50 50)"/>
            <path d="M41 50 L37 9 Q50 1 63 9 L59 50 Z" fill="#0a0a0a" transform="rotate(180 50 50)"/>
            <path d="M41 50 L37 9 Q50 1 63 9 L59 50 Z" fill="#0a0a0a" transform="rotate(240 50 50)"/>
            <path d="M41 50 L37 9 Q50 1 63 9 L59 50 Z" fill="#0a0a0a" transform="rotate(300 50 50)"/>
          </svg>
        </span>
        <span class="lw-wing">WING</span><span class="lw-tm">™</span>
      </div>
      <span class="lw-sub">Impeller Intelligence</span>
    </div>
  </a>
  <a class="dashboard-link" href="dashboard.html">Dashboard →</a>
</header>

<div class="hero">
  <div class="hero-eyebrow">Field Feedback</div>
  <div class="hero-title">Report an Issue</div>
  <div class="hero-sub">Takes 60 seconds</div>
</div>

<div class="form-wrap">
  <div id="errorBanner" class="error-banner"></div>

  <div class="step-label">What is the problem?</div>
  <div class="btn-grid">
    <button class="sym-btn" type="button" data-val="Flow deviation" onclick="toggleSym(this)">
      Flow too low / high
      <span>Not reaching design flow</span>
    </button>
    <button class="sym-btn" type="button" data-val="Noise" onclick="toggleSym(this)">
      Noise
      <span>Unusual sound level</span>
    </button>
    <button class="sym-btn" type="button" data-val="Vibration" onclick="toggleSym(this)">
      Vibration
      <span>Excessive shaking</span>
    </button>
    <button class="sym-btn" type="button" data-val="Pressure issue" onclick="toggleSym(this)">
      Pressure
      <span>Not reaching static pressure</span>
    </button>
    <button class="sym-btn" type="button" data-val="Overheating" onclick="toggleSym(this)">
      Overheating
      <span>Motor or bearing temp</span>
    </button>
    <button class="sym-btn" type="button" data-val="Other" onclick="toggleSym(this)">
      Other
      <span>Describe below</span>
    </button>
  </div>

  <div class="step-label">Impeller details</div>
  <div class="two-col">
    <div class="input-group">
      <label>Impeller Model</label>
      <input id="model" placeholder="e.g. 7C/3150/6" />
    </div>
    <div class="input-group">
      <label>System Type</label>
      <select id="system_type">
        <option value="">— Select —</option>
        <option>HVAC</option>
        <option>Industrial ventilation</option>
        <option>Process cooling</option>
        <option>Powertrain cooling</option>
        <option>Exhaust system</option>
        <option>Other</option>
      </select>
    </div>
  </div>

  <div class="step-label">Performance (optional)</div>
  <div class="two-col">
    <div class="input-group">
      <label>Expected Flow</label>
      <div class="unit-wrap">
        <input id="expected_flow" type="number" placeholder="12000" />
        <div class="unit">m³/h</div>
      </div>
    </div>
    <div class="input-group">
      <label>Actual Flow</label>
      <div class="unit-wrap">
        <input id="actual_flow" type="number" placeholder="9800" />
        <div class="unit">m³/h</div>
      </div>
    </div>
  </div>

  <div class="step-label">What happened?</div>
  <div class="input-group">
    <textarea id="reality" placeholder="Describe what you observed — when did it start, operating conditions, any recent changes..."></textarea>
  </div>

  <div class="submit-area">
    <button class="btn-submit" id="submitBtn" type="button" onclick="submit()">Submit Feedback →</button>
  </div>

  <div class="demo-badge" id="demoBadge">Demo mode — deploy to Vercel with API key for live Claude analysis</div>
  <div class="result-card" id="resultCard">
    <div class="result-cat" id="resCat"></div>
    <div class="result-cause" id="resCause"></div>
    <div class="result-actions" id="resActions"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dnjkexltcdgpjjmqwwmk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRuamtleGx0Y2RncGpqbXF3d21rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzgyMzAsImV4cCI6MjA4ODQ1NDIzMH0.GpJ0woQTur1HFpPDl-pRLZDpiO7eJESrr6IxE2HF8Q4';

let selectedSymptom = '';

function toggleSym(el) {
  document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedSymptom = el.dataset.val;
}

async function saveToSupabase(payload) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/feedback`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(payload)
  });

  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Supabase save failed: ${res.status} ${txt}`);
  }

  return res.json();
}

async function submit() {
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorBanner');
  const model = document.getElementById('model').value.trim();
  const system_type = document.getElementById('system_type').value;
  const expected_flow = document.getElementById('expected_flow').value;
  const actual_flow = document.getElementById('actual_flow').value;
  const reality = document.getElementById('reality').value.trim();

  if (!selectedSymptom && !reality) {
    err.textContent = 'Please select a problem type or describe what happened.';
    err.style.display = 'block';
    return;
  }

  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Analyzing...';

  const text = [
    selectedSymptom && 'Primary symptom: ' + selectedSymptom,
    model && 'Impeller Model: ' + model,
    system_type && 'System Type: ' + system_type,
    expected_flow && 'Expected Flow: ' + expected_flow + ' m³/h',
    actual_flow && 'Actual Flow: ' + actual_flow + ' m³/h',
    reality && 'Description: ' + reality
  ].filter(Boolean).join('\n');

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text, model, system_type, expected_flow, actual_flow})
    });

    let data;
    if (!res.ok) throw new Error('api_' + res.status);
    data = await res.json();

    await handleResult(data, false, {
      model,
      system_type,
      expected_flow,
      actual_flow,
      reality
    });
  } catch (e) {
    const demo = buildDemo(selectedSymptom || reality, system_type, expected_flow, actual_flow);

    await handleResult(demo, true, {
      model,
      system_type,
      expected_flow,
      actual_flow,
      reality
    });
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Feedback →';
  }
}

async function handleResult(data, isDemo, formData) {
  document.getElementById('demoBadge').style.display = isDemo ? 'block' : 'none';
  document.getElementById('resCat').textContent = data.category || 'Unknown';
  document.getElementById('resCause').textContent = data.probable_cause || data.possible_cause || '';
  const actEl = document.getElementById('resActions');
  actEl.innerHTML = (data.recommended_actions || []).map(a => '<div class="result-action">' + a + '</div>').join('');
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth', block:'start'});

  const payload = {
    model: formData.model || null,
    system_type: formData.system_type || null,
    category: data.category || selectedSymptom || 'Unknown',
    system_issue: selectedSymptom || 'Unknown',
    probable_cause: data.probable_cause || data.possible_cause || formData.reality || null,
    severity: Number(data.severity) || 3,
    confidence: Number(data.confidence) || 75,
    installation_vs_design: data.installation_vs_design || 'Unknown',
    impeller_relevance: data.impeller_relevance || 'Unknown',
    expected_flow: formData.expected_flow ? Number(formData.expected_flow) : null,
    actual_flow: formData.actual_flow ? Number(formData.actual_flow) : null
  };

  await saveToSupabase(payload);

  const submissions = JSON.parse(sessionStorage.getItem('submissions') || '[]');
  submissions.unshift({
    id: Date.now(),
    model: formData.model || '—',
    system: formData.system_type || '—',
    symptom: selectedSymptom || 'Other',
    category: data.category || 'Unknown',
    cause: data.probable_cause || data.possible_cause || '',
    severity: Number(data.severity) || 3,
    confidence: Number(data.confidence) || 75,
    actions: data.recommended_actions || [],
    time: new Date().toLocaleString('en-GB', {hour:'2-digit', minute:'2-digit', day:'2-digit', month:'short'})
  });
  sessionStorage.setItem('submissions', JSON.stringify(submissions.slice(0, 50)));
}

function buildDemo(input, sys, exp, act) {
  const t = (input || '').toLowerCase();

  if (t.includes('flow') || t.includes('flow deviation') || (exp && act && Number(act) < Number(exp) * 0.9)) {
    return {
      category: 'Flow deviation',
      possible_cause: 'Actual airflow is below specification. Likely caused by higher system resistance than designed — check duct restrictions, damper positions, or blade pitch.',
      severity: 3,
      confidence: 81,
      installation_vs_design: 'Installation',
      impeller_relevance: 'High',
      recommended_actions: [
        'Measure static pressure at inlet/outlet',
        'Verify all dampers are fully open',
        'Check blade pitch against spec sheet',
        'Re-run system curve calculation'
      ]
    };
  }

  if (t.includes('noise')) {
    return {
      category: 'Noise',
      possible_cause: 'Elevated noise indicates blade tip interference, inlet turbulence, or structural resonance at blade pass frequency.',
      severity: 3,
      confidence: 78,
      installation_vs_design: 'Unknown',
      impeller_relevance: 'Medium',
      recommended_actions: [
        'Measure SPL at 1m',
        'Inspect inlet clearance',
        'Check for loose mounting hardware',
        'Verify RPM matches nameplate'
      ]
    };
  }

  if (t.includes('vibrat')) {
    return {
      category: 'Vibration',
      possible_cause: 'Mass imbalance on impeller or bearing wear. Also check resonance between fan frequency and mounting frame natural frequency.',
      severity: 4,
      confidence: 83,
      installation_vs_design: 'Unknown',
      impeller_relevance: 'High',
      recommended_actions: [
        'Dynamic balance check (ISO 1940 G2.5)',
        'Inspect bearings for contamination',
        'Check all mounting bolts',
        'Measure vibration velocity mm/s RMS'
      ]
    };
  }

  if (t.includes('pressure')) {
    return {
      category: 'Pressure issue',
      possible_cause: 'Fan not reaching required static pressure. Possible stall, incorrect impeller diameter, or system leakage.',
      severity: 3,
      confidence: 76,
      installation_vs_design: 'Design',
      impeller_relevance: 'High',
      recommended_actions: [
        'Plot duty point on fan curve',
        'Seal duct joints',
        'Verify impeller diameter and blade count',
        'Check motor speed with tachometer'
      ]
    };
  }

  if (t.includes('heat') || t.includes('overheat')) {
    return {
      category: 'Overheating',
      possible_cause: 'Motor temperature exceeds limits due to insufficient cooling airflow, overloading from high air density, or blocked ventilation.',
      severity: 4,
      confidence: 80,
      installation_vs_design: 'Installation',
      impeller_relevance: 'Medium',
      recommended_actions: [
        'Check motor ambient temperature vs. class rating',
        'Measure actual current vs. FLA',
        'Verify cooling path is unobstructed',
        'Review thermal protection settings'
      ]
    };
  }

  return {
    category: 'General issue',
    possible_cause: 'Insufficient data for precise diagnosis. Please add more detail about symptoms and operating conditions.',
    severity: 2,
    confidence: 55,
    installation_vs_design: 'Unknown',
    impeller_relevance: 'Unknown',
    recommended_actions: [
      'Document operating conditions at time of issue',
      'Compare with commissioning data',
      'Contact Multi-Wing technical support'
    ]
  };
}
</script>
</body>
</html>
