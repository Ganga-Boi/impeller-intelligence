<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MULTI*WING — Field Feedback Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#f0f1f2;
--white:#ffffff;
--black:#0a0a0a;
--grey-light:#e8e9eb;
--grey-mid:#b0b4b8;
--grey-dark:#6b7075;
--green:#2e7d4f;
--yellow:#e8a020;
--red:#c0392b;
--blue:#1a6eb5;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Barlow',sans-serif;
background:var(--bg);
color:var(--black);
min-height:100vh;
}

header{
background:var(--white);
border-bottom:1px solid var(--grey-light);
padding:0 40px;
height:64px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo-lockup{
display:flex;
align-items:center;
gap:10px;
text-decoration:none;
color:var(--black);
}

.lw-star{
width:19px;
height:19px;
animation:spin-blade 8s linear infinite;
}

@keyframes spin-blade{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.logo-wordmark{
display:flex;
flex-direction:column;
line-height:1;
}

.lw-multi,.lw-wing{
font-family:'Barlow Condensed',sans-serif;
font-size:21px;
font-weight:900;
letter-spacing:0.04em;
}

.lw-sub{
font-family:'Barlow Condensed',sans-serif;
font-size:11px;
font-weight:600;
letter-spacing:0.12em;
text-transform:uppercase;
color:var(--grey-dark);
margin-top:2px;
}

.nav-links{
display:flex;
gap:4px;
}

.nav-link{
font-family:'Barlow Condensed',sans-serif;
font-size:12px;
font-weight:700;
letter-spacing:0.1em;
text-transform:uppercase;
color:var(--grey-dark);
text-decoration:none;
padding:8px 16px;
border-radius:100px;
}

.nav-link.active{
background:var(--black);
color:white;
}

.hero{
background:var(--black);
color:white;
padding:40px;
}

.hero-title{
font-family:'Barlow Condensed',sans-serif;
font-size:48px;
font-weight:800;
text-transform:uppercase;
line-height:1;
}

.kpi-row{
display:flex;
gap:40px;
}

.kpi{
text-align:right;
}

.kpi-num{
font-family:'Barlow Condensed',sans-serif;
font-size:36px;
font-weight:800;
}

.kpi-label{
font-family:'Barlow Condensed',sans-serif;
font-size:10px;
letter-spacing:0.2em;
text-transform:uppercase;
color:rgba(255,255,255,0.4);
}

.main{
max-width:1200px;
margin:auto;
padding:40px;
}

.status-box{
background:white;
padding:28px;
margin-bottom:24px;
color:var(--grey-dark);
font-size:14px;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th{
font-family:'Barlow Condensed',sans-serif;
font-size:10px;
letter-spacing:0.15em;
text-transform:uppercase;
color:var(--grey-dark);
text-align:left;
padding:8px 0;
border-bottom:1px solid var(--grey-light);
}

.table td{
font-size:13px;
padding:10px 0;
border-bottom:1px solid var(--grey-light);
}

</style>
</head>

<body>

<header>
<a class="logo-lockup" href="/">
<div class="logo-wordmark">
<div style="display:flex;align-items:center;">
<span class="lw-multi">MULTI</span>
<svg class="lw-star" viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45" fill="#0a0a0a"/>
</svg>
<span class="lw-wing">WING</span>
</div>
<span class="lw-sub">Field Feedback Dashboard</span>
</div>
</a>

<nav class="nav-links">
<a class="nav-link" href="/">Submit Feedback</a>
<a class="nav-link active" href="/dashboard.html">Dashboard</a>
</nav>
</header>

<div class="hero">
<div class="hero-title">Field Feedback<br>Intelligence</div>

<div class="kpi-row">
<div class="kpi">
<div class="kpi-num" id="kpiTotal">0</div>
<div class="kpi-label">Total Submissions</div>
</div>

<div class="kpi">
<div class="kpi-num" id="kpiModels">0</div>
<div class="kpi-label">Unique Models</div>
</div>
</div>
</div>

<div class="main">

<div id="statusBox" class="status-box">Loading live data...</div>

<div id="dashboardContent" style="display:none;">

<table class="table">
<thead>
<tr>
<th>Model</th>
<th>System Type</th>
<th>Issue</th>
<th>Cause</th>
<th>Time</th>
</tr>
</thead>
<tbody id="recentTable"></tbody>
</table>

</div>
</div>

<script>

const SUPABASE_URL="https://dnjkexltcdgpjjmqwwmk.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRuamtleGx0Y2RncGpqbXF3d21rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzgyMzAsImV4cCI6MjA4ODQ1NDIzMH0.GpJ0woQTur1HFpPDl-pRLZDpiO7eJESrr6IxE2HF8Q4";

async function loadData(){

const res=await fetch(`${SUPABASE_URL}/rest/v1/feedback?select=*&order=id.desc`,{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
});

const rows=await res.json();

if(!rows.length){
document.getElementById("statusBox").innerText="No submissions yet.";
return;
}

document.getElementById("statusBox").style.display="none";
document.getElementById("dashboardContent").style.display="block";

document.getElementById("kpiTotal").innerText=rows.length;

const models=new Set(rows.map(r=>r.model));
document.getElementById("kpiModels").innerText=models.size;

const table=document.getElementById("recentTable");

rows.forEach(r=>{

table.innerHTML+=`
<tr>
<td>${r.model}</td>
<td>${r.system_type}</td>
<td>${r.system_issue}</td>
<td>${r.probable_cause}</td>
<td>${new Date(r.created_at).toLocaleTimeString()}</td>
</tr>
`;

});

}

loadData();

</script>

</body>
</html>
