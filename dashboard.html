<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MULTI*WING — Field Feedback Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

:root{
--black:#0a0a0a;
--white:#fff;
--bg:#f0f1f2;
--grey:#e2e3e5;
--grey2:#b0b4b8;
--grey3:#6b7075;
}

body{
font-family:'Barlow',sans-serif;
background:var(--bg);
color:var(--black);
min-height:100vh;
}

/* HEADER */

header{
background:white;
border-bottom:1px solid var(--grey);
padding:0 20px;
height:56px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-family:'Barlow Condensed';
font-weight:900;
font-size:18px;
letter-spacing:.04em;
}

.header-links a{
font-family:'Barlow Condensed';
font-size:11px;
letter-spacing:.12em;
text-transform:uppercase;
text-decoration:none;
color:var(--grey3);
margin-left:20px;
}

/* HERO */

.hero{
background:black;
color:white;
padding:40px 20px;
}

.hero-title{
font-family:'Barlow Condensed';
font-size:42px;
font-weight:900;
text-transform:uppercase;
line-height:1;
}

.stats{
display:flex;
gap:60px;
margin-top:20px;
}

.stat-number{
font-family:'Barlow Condensed';
font-size:36px;
font-weight:900;
}

.stat-label{
font-family:'Barlow Condensed';
font-size:10px;
letter-spacing:.2em;
color:#aaa;
text-transform:uppercase;
}

/* CONTENT */

.container{
max-width:900px;
margin:40px auto;
padding:0 20px;
}

.submissions{
background:white;
padding:30px;
border:1px solid var(--grey);
}

.item{
padding:16px 0;
border-bottom:1px solid var(--grey);
}

.item:last-child{
border-bottom:none;
}

.model{
font-family:'Barlow Condensed';
font-size:18px;
font-weight:700;
}

.meta{
font-size:13px;
color:var(--grey3);
margin-top:4px;
}

</style>
</head>

<body>

<header>

<div class="logo">
MULTI<span style="display:inline-block;transform:rotate(20deg)">✶</span>WING
</div>

<div class="header-links">
<a href="index.html">Submit Feedback</a>
</div>

</header>

<div class="hero">

<div class="hero-title">
Field Feedback<br>
Intelligence
</div>

<div class="stats">

<div>
<div id="totalSubmissions" class="stat-number">0</div>
<div class="stat-label">Total Submissions</div>
</div>

<div>
<div id="uniqueModels" class="stat-number">0</div>
<div class="stat-label">Unique Models</div>
</div>

</div>

</div>

<div class="container">

<div class="submissions" id="submissions">
No submissions yet.
</div>

</div>

<script>

const SUPABASE_URL = "https://dnjkexltcdgpjjmqwwmk.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

async function loadDashboard(){

const res = await fetch(`${SUPABASE_URL}/rest/v1/feedback?select=*`,{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
})

const data = await res.json()

document.getElementById("totalSubmissions").innerText = data.length

const models = [...new Set(data.map(r=>r.model))]
document.getElementById("uniqueModels").innerText = models.length

const container = document.getElementById("submissions")

if(data.length === 0){
container.innerHTML = "No submissions yet."
return
}

container.innerHTML = data.map(row=>`
<div class="item">
<div class="model">${row.model}</div>
<div class="meta">${row.category} • ${row.system_issue}</div>
</div>
`).join("")

}

loadDashboard()

</script>

</body>
</html>
